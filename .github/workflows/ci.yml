name: CI

# Gates every push and PR. The question bank is the product: a wrong answer
# key or a silent audio clip is a refund, and neither fails loudly at runtime,
# so integrity is enforced here rather than caught by users.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Question bank integrity
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright's browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end (practice session + full mock test)
        run: npm run test:e2e
